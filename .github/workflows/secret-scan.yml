name: Secret Scan

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    gitleaks:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Scan for secrets
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
